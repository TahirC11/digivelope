<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  body {
    background: transparent;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #111111; /* Change color to match your Canva design */
    text-align: center;
    margin: 0;
    padding: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }
  #countdown {
    display: flex;
    gap: 12px;
  }
  .time-box {
    background: #ffffff; /* Background color of the countdown blocks */
    border: 1px solid #e1e1e1;
    padding: 12px 16px;
    border-radius: 12px;
    min-width: 65px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.05);
  }
  .number {
    font-size: 2.2rem;
    font-weight: 700;
    display: block;
    line-height: 1;
    margin-bottom: 4px;
  }
  .label {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #666666;
  }
</style>
</head>
<body>

<div id="countdown">
  <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
  <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
  <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Min</span></div>
  <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Sec</span></div>
</div>

<script>
  // CHANGE THIS TO YOUR TARGET DATE AND TIME
  const targetDate = new Date("2026-08-08T23:59:59").getTime();

  const updateTimer = setInterval(function() {
    const now = new Date().getTime();
    const difference = targetDate - now;

    if (difference < 0) {
      clearInterval(updateTimer);
      document.getElementById("countdown").innerHTML = "<div style='font-size:1.5rem; font-weight:bold;'>Event Started!</div>";
      return;
    }

    const d = Math.floor(difference / (1000 * 60 * 60 * 24));
    const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((difference % (1000 * 60)) / 1000);

    document.getElementById("days").textContent = String(d).padStart(2, '0');
    document.getElementById("hours").textContent = String(h).padStart(2, '0');
    document.getElementById("minutes").textContent = String(m).padStart(2, '0');
    document.getElementById("seconds").textContent = String(s).padStart(2, '0');
  }, 1000);
</script>
</body>
</html>
